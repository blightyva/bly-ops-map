name: Update BLY flight history

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes (UTC)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-history:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch VATSIM + update history.json
        shell: bash
        run: |
          set -euo pipefail

          FEED="https://data.vatsim.net/v3/vatsim-data.json"
          curl -fsSL "$FEED" -o vatsim.json

          if [ ! -f history.json ]; then
            echo '{"updated_utc": null, "flights": []}' > history.json
          fi

          python3 - << 'PY'
          import json, datetime, hashlib

          NOW = datetime.datetime.utcnow().replace(microsecond=0)
          now_iso = NOW.isoformat() + "Z"
          cutoff = NOW - datetime.timedelta(days=28)

          SESSION_GAP_MINUTES = 30  # if flight disappears for >= this long, next appearance is a new "session"

          def parse_iso(s):
            try:
              return datetime.datetime.fromisoformat(s.replace("Z","+00:00")).replace(tzinfo=None)
            except Exception:
              return None

          def make_base(callsign, dep, arr, aircraft):
            return f"{callsign}|{dep}|{arr}|{aircraft}"

          def make_key(base, session_start_iso):
            raw = f"{base}|{session_start_iso}"
            return hashlib.sha1(raw.encode("utf-8")).hexdigest()

          # Load current VATSIM snapshot + existing history
          with open("vatsim.json","r",encoding="utf-8") as f:
            vatsim = json.load(f)

          with open("history.json","r",encoding="utf-8") as f:
            hist = json.load(f)

          sessions = hist.get("flights", []) or []

          # Index existing sessions by key
          by_key = {x.get("key"): x for x in sessions if x.get("key")}

          # Track the latest session for each base (callsign+route+aircraft)
          latest_by_base = {}
          for s in sessions:
            base = s.get("base")
            if not base:
              continue
            dt = parse_iso(s.get("last_seen_utc",""))
            if dt is None:
              continue
            prev = latest_by_base.get(base)
            if (prev is None) or (parse_iso(prev.get("last_seen_utc","")) < dt):
              latest_by_base[base] = s

          # Process current BLY pilots
          for p in (vatsim.get("pilots") or []):
            cs = p.get("callsign") or ""
            if not cs.startswith("BLY"):
              continue

            fp = p.get("flight_plan") or {}
            dep = fp.get("departure") or "-"
            arr = fp.get("arrival") or "-"
            aircraft = fp.get("aircraft") or "-"

            base = make_base(cs, dep, arr, aircraft)

            existing = latest_by_base.get(base)
            last_seen = parse_iso(existing.get("last_seen_utc","")) if existing else None

            # Continue same session if it's been seen recently; otherwise start new session
            start_new = True
            if last_seen is not None:
              gap = NOW - last_seen
              if gap <= datetime.timedelta(minutes=SESSION_GAP_MINUTES):
                start_new = False

            if start_new:
              session_start_iso = now_iso
              key = make_key(base, session_start_iso)
              record = {
                "key": key,
                "base": base,
                "callsign": cs,
                "departure": dep,
                "destination": arr,
                "aircraft": aircraft,
                "first_seen_utc": now_iso,
                "last_seen_utc": now_iso,
                "seen_count": 1
              }
              by_key[key] = record
              latest_by_base[base] = record
            else:
              existing["last_seen_utc"] = now_iso
              existing["seen_count"] = int(existing.get("seen_count", 0)) + 1
              by_key[existing["key"]] = existing

          # Prune anything older than 4 weeks (based on last_seen_utc)
          kept = []
          for item in by_key.values():
            dt = parse_iso(item.get("last_seen_utc",""))
            if dt and dt >= cutoff:
              kept.append(item)

          # Sort newest first
          kept.sort(key=lambda x: x.get("last_seen_utc",""), reverse=True)

          out = {"updated_utc": now_iso, "flights": kept}
          with open("history.json","w",encoding="utf-8") as f:
            json.dump(out, f, indent=2)
          PY

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi
          git add history.json
          git commit -m "Update BLY history"
          git push
